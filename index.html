<!DOCTYPE html>
<!-- ==========================================================
  Sistema de Seguimiento de Tareas Escolares
  Página: Login Administrador
  ========================================================== -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Sistema de Seguimiento de Tareas Escolares</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <!-- ====== LADO IZQUIERDO: FORMULARIO ====== -->
  <div class="login-left">
    <div class="login-container">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">📚</div>
        <span class="login-logo-text">TaskTracker</span>
      </div>

      <!-- Título -->
      <h1 class="login-title">Iniciar Sesión</h1>
      <p class="login-subtitle">Accede al panel de administración educativa</p>

      <!-- Formulario (solo visual) -->
      <form class="login-form" onsubmit="return false;">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Correo electrónico</label>
          <input
            class="form-input"
            type="email"
            id="loginEmail"
            placeholder="admin@institucion.edu"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label class="form-label" for="loginPassword">Contraseña</label>
          <input
            class="form-input"
            type="password"
            id="loginPassword"
            placeholder="••••••••"
            autocomplete="current-password"
          />
        </div>

        <button class="btn btn-primary btn-lg w-100" onclick="window.location.href='dashboard.html'">
          Iniciar Sesión
        </button>
      </form>

      <p class="login-footer">
        ¿Olvidaste tu contraseña? <a href="#" style="color: var(--primary); font-weight: 500;">Recuperar acceso</a>
      </p>
    </div>
  </div>

  <!-- ====== LADO DERECHO: ILUSTRACIÓN ====== -->
  <div class="login-right">
    <div class="login-illustration">
      <div class="login-illustration-icon">🎓</div>
      <h2>Sistema de Seguimiento de Tareas Escolares</h2>
      <p>
        Plataforma administrativa para docentes, padres y administración escolar.
        Gestiona tareas, calificaciones y comunicación educativa.
      </p>
    </div>
  </div>

</body>
</html>
