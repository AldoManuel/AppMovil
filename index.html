<!DOCTYPE html>
<!-- ==========================================================
  Sistema de Gestión Educativa
  Página: Login / Registro
  ========================================================== -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Sistema de Gestión Educativa</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <!-- ====== LADO IZQUIERDO: FORMULARIO ====== -->
  <div class="login-left">
    <div class="login-container">

      <!-- Logo -->
      <div class="login-logo">
        <div class="login-logo-icon">📚</div>
        <span class="login-logo-text">TaskTracker</span>
      </div>

      <!-- Tabs -->
      <div class="tabs login-tabs">
        <div class="tab-item active" data-tab="loginTab">Iniciar Sesión</div>
        <div class="tab-item" data-tab="registerTab">Registrarse</div>
      </div>

      <!-- Tab: Iniciar Sesión -->
      <div class="tab-content active" id="loginTab">
        <form class="login-form" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label" for="loginEmail">Correo electrónico</label>
            <input
              class="form-input"
              type="email"
              id="loginEmail"
              placeholder="admin@institucion.edu"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="loginPassword">Contraseña</label>
            <input
              class="form-input"
              type="password"
              id="loginPassword"
              placeholder="••••••••"
              autocomplete="current-password"
            />
          </div>

          <button class="btn btn-primary btn-lg w-100" onclick="window.location.href='dashboard.html'">
            Iniciar Sesión
          </button>
        </form>

        <p class="login-footer">
          ¿Olvidaste tu contraseña? <a href="#" style="color: var(--primary); font-weight: 500;">Recuperar acceso</a>
        </p>
      </div>

      <!-- Tab: Registrarse -->
      <div class="tab-content" id="registerTab">
        <form class="login-form" onsubmit="return false;">
          <div class="form-group">
            <label class="form-label" for="regName">Nombre completo</label>
            <input
              class="form-input"
              type="text"
              id="regName"
              placeholder="Tu nombre completo"
              autocomplete="name"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="regEmail">Correo electrónico</label>
            <input
              class="form-input"
              type="email"
              id="regEmail"
              placeholder="correo@ejemplo.com"
              autocomplete="email"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="regRole">Rol</label>
            <select class="form-select" id="regRole">
              <option value="">Seleccionar rol</option>
              <option value="docente">Docente</option>
              <option value="padre">Padre de Familia</option>
              <option value="administrativo">Personal Administrativo</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label" for="regPassword">Contraseña</label>
            <input
              class="form-input"
              type="password"
              id="regPassword"
              placeholder="••••••••"
              autocomplete="new-password"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="regConfirm">Confirmar contraseña</label>
            <input
              class="form-input"
              type="password"
              id="regConfirm"
              placeholder="••••••••"
              autocomplete="new-password"
            />
          </div>

          <button class="btn btn-primary btn-lg w-100" data-toast="Registro simulado — cuenta creada exitosamente">
            Crear Cuenta
          </button>
        </form>

        <p class="login-footer">
          ¿Ya tienes cuenta? <a href="#" style="color: var(--primary); font-weight: 500;" class="switch-to-login">Inicia Sesión</a>
        </p>
      </div>

    </div>
  </div>

  <!-- ====== LADO DERECHO: ILUSTRACIÓN ====== -->
  <div class="login-right">
    <div class="login-illustration">
      <div class="login-illustration-icon">🎓</div>
      <h2>Sistema de Gestión Educativa</h2>
      <p>
        Plataforma administrativa para docentes, padres y administración escolar.
        Gestiona calificaciones y comunicación educativa.
      </p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
