<!DOCTYPE html>
<!-- ==========================================================
  Sistema de Gestión Educativa
  Página: Login / Registro
  ========================================================== -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar Sesión — Sistema de Gestión Educativa</title>
  <link rel="stylesheet" href="assets/css/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>
</head>
<body class="login-page">

  <div class="login-left">
    <div class="login-container">

      <div class="login-logo">
        <div class="login-logo-icon">📚</div>
        <span class="login-logo-text">TaskTracker</span>
      </div>

      <form class="login-form" id="loginForm">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Correo electrónico</label>
          <input class="form-input" type="email" id="loginEmail" placeholder="admin@institucion.edu" autocomplete="email" required />
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Contraseña</label>
          <input class="form-input" type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password" required />
        </div>
        <div id="loginError" class="alert alert-error" style="display: none; margin-bottom: 12px;"></div>
        <button class="btn btn-primary btn-lg w-100" type="submit" id="loginBtn">Iniciar Sesión</button>
      </form>
      <p class="login-footer">
        ¿Olvidaste tu contraseña? <a href="#" style="color: var(--primary); font-weight: 500;">Recuperar acceso</a>
      </p>
      <p class="login-footer" style="margin-top: 8px; border-top: 1px solid var(--border-color, #e5e7eb); padding-top: 16px;">
        ¿No tienes cuenta? <a href="registro.html" style="color: var(--primary); font-weight: 500;">Regístrate</a>
      </p>

    </div>
  </div>

  <div class="login-right">
    <div class="login-illustration">
      <div class="login-illustration-icon">🎓</div>
      <h2>Sistema de Gestión Educativa</h2>
      <p>
        Plataforma administrativa para docentes, padres y administración escolar.
        Gestiona calificaciones y comunicación educativa.
      </p>
    </div>
  </div>

  <script src="assets/js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {

      document.getElementById('loginForm').addEventListener('submit', async function (e) {
        e.preventDefault()
        const email = document.getElementById('loginEmail').value.trim()
        const password = document.getElementById('loginPassword').value
        const errorEl = document.getElementById('loginError')
        const btn = document.getElementById('loginBtn')

        btn.disabled = true
        btn.textContent = 'Ingresando...'
        errorEl.style.display = 'none'

        console.log('[Auth] Iniciando sesión con:', email)

        try {
          const result = await iniciarSesion(email, password)
          if (result.success) {
            console.log('[Auth] Login exitoso:', result.nombre, '(' + result.rol + ')')
            localStorage.setItem('session_usuario', JSON.stringify({
              id_usuario: result.id_usuario,
              nombre: result.nombre,
              apellido_paterno: result.apellido_paterno,
              correo: result.correo,
              rol: result.rol
            }))
            console.log('[Auth] Sesión guardada, redirigiendo...')
            window.location.href = 'dashboard.html'
          } else {
            console.error('[Auth] Error de login:', result.error)
            errorEl.textContent = result.error
            errorEl.style.display = 'block'
          }
        } catch (err) {
          console.error('[Auth] Error inesperado:', err.message)
          errorEl.textContent = err.message || 'Error de conexión con el servidor'
          errorEl.style.display = 'block'
        } finally {
          btn.disabled = false
          btn.textContent = 'Iniciar Sesión'
        }
      })

    })
  </script>
</body>
</html>
